schema_version: 1
task: auth-verify-handlers
brief: .octospec/tasks/auth-verify-handlers/brief.md
issue: octo-server#428

touched_paths:
  - pkg/errcode/auth.go                              # new: three err.server.auth.* codes
  - pkg/i18n/locales/active.zh-CN.toml               # new entries for the three codes
  - tools/i18nmarkers/server/active.en-US.toml       # regenerated by make i18n-extract
  - modules/auth/contract.go                         # new: HTTP DTOs (additive)
  - modules/auth/registry.go                         # new: BotLookup / APIKeyLookup singleton
  - modules/auth/service.go                          # new: Service.VerifyUser / VerifyBot business logic
  - modules/auth/api.go                              # new: HTTP handlers + sentinel→errcode mapping
  - modules/auth/1module.go                          # new: module registration + verify routes
  - modules/auth/service_test.go                     # new: fakeBotLookup-driven service tests
  - modules/bot_api/1module.go                       # SetupAPI now calls auth.SetBotLookup(ba)
  - modules/usersecret/1module.go                    # SetupAPI now calls auth.SetAPIKeyLookup(a)
  - modules/user/api.go                              # removed verify route registrations + handler bodies + verifyLimit decl
  - internal/modules.go                              # blank import for modules/auth

load_bearing_tags: [auth, wire-contract, bot-api, space, isolation, error-response, i18n]

injected_rules:
  - id: space-isolation
    priority: 92
    load_bearing: true
    matched_by:
      paths: ["modules/**/*.go", "internal/**/*.go"]
      touches: ["auth", "bot-api", "isolation", "space"]
    why: >
      VerifyBot's response now carries bot_kind / scope / space_id that
      downstream SDK callers (PR-C3 RequireSpaceMember) use to fail-closed
      cross-space access. AppBotIdentity.Scope / SpaceID are taken verbatim
      from bot_api.LookupAppBot which preserves the SAME field plumbing as
      the existing authAppBot middleware (auth.go:73-74 sets
      CtxKeyAppBotSpaceID only when Scope=="space"); no widening, no
      fail-open added. The User Bot path's space_id field continues to map
      to the legacy "first active space_member row" semantic so existing
      consumers see byte-identical behaviour.
  - id: error-handling
    priority: 85
    load_bearing: true
    matched_by:
      paths: ["modules/**/*.go", "pkg/errcode/**"]
      touches: ["error-response", "i18n", "wire-contract"]
    why: >
      All failure paths use httperr.ResponseErrorL with registered
      errcode.ErrAuth* codes — no raw c.JSON / AbortWithStatusJSON
      remains. Anti-enumeration: ErrInvalidUserToken / ErrInvalidBotToken
      both collapse to a single 401 ErrAuthTokenInvalid at the wire;
      specific reason only in zap log. ErrAuthBotUnpublished is the one
      503 exception (App Bot exists but status != 1) per CLAUDE.md's
      Internal=false 4xx vs 5xx mapping rule.
      Wire-contract: legacy field positions and JSON tags preserved
      verbatim in modules/auth/contract.go; new fields (schema_version,
      kind, bot_kind, scope) are additive only, so existing
      matter / fleet consumers ignore them and continue to work.
      i18n: three new codes registered with zh-CN translations;
      make i18n-extract regenerated server markers; make i18n-lint
      green (no new raw error responses introduced).
  - id: rate-limit
    priority: 80
    load_bearing: true
    matched_by:
      paths: ["modules/**/*.go"]
      touches: ["rate-limit", "throttle"]
    why: >
      The verifyLimit rate-limiter (StrictIPRateLimitMiddleware,
      tag "verify", 1000 req/min/IP / burst 100) is recreated in
      modules/auth/1module.go with the IDENTICAL tag string. Sharing
      the tag keeps the Redis bucket namespace
      (ratelimit:strict:verify:ip:*) byte-for-byte the same so
      operator-side dashboards / runbooks tracking the verify
      endpoints continue to apply. modules/user no longer needs the
      decl (removed to avoid unused-var compile error).
  - id: testing
    priority: 70
    load_bearing: false
    matched_by:
      paths: ["**/*_test.go"]
      touches: ["test"]
    why: >
      service_test.go uses an in-memory fakeBotLookup to exercise the
      prefix routing (bf_/app_), sentinel mapping
      (ErrAppBotUnpublished → ErrBotUnavailable), empty-token
      short-circuit, and no-provider fallback. These tests run without a
      DB. lookupUserName + the User Bot space_id query are guarded by
      `if s.ctx != nil` so service_test.go can construct a Service{}
      without standing up the full env-test stack; integration tests
      against a live DB still cover the hydrated paths via the broader
      go test ./... matrix.

not_injected:
  - id: commit-style
    why: Always-on convention; applied at commit time.
