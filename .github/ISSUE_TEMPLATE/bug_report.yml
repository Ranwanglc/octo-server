name: 🐛 Bug 报告
description: 报告一个 Bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 Bug！请尽量填写完整信息，帮助我们快速定位问题。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要描述遇到的问题
      placeholder: 发送消息后，对方收到两条重复消息
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按顺序列出复现步骤
      placeholder: |
        1. 创建群聊
        2. 添加 Bot 到群聊
        3. 发送消息 "test"
        4. 观察：Bot 回复了两次
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: Bot 只回复一次
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      placeholder: Bot 回复了两次，内容完全相同
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DMWork 版本
      placeholder: "v1.1.1"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: 影响组件
      options:
        - 后端 (Server)
        - Web 前端
        - Android 客户端
        - Bot API / BotFather
        - OpenClaw Adapter
        - WuKongIM
        - 其他
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      options:
        - P0 - 服务不可用 / 数据丢失
        - P1 - 核心功能异常
        - P2 - 非核心功能异常
        - P3 - 体验问题
    validations:
      required: true
  - type: checkboxes
    id: reproducible
    attributes:
      label: 可复现性
      options:
        - label: 可稳定复现
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: OS、浏览器、部署方式等
      placeholder: |
        - OS: Ubuntu 24.04
        - 部署方式: Docker Compose
        - 浏览器: Chrome 133
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 相关日志、错误信息或截图（敏感信息请脱敏）
    validations:
      required: false
  - type: textarea
    id: workaround
    attributes:
      label: 临时解决方案
      description: 是否找到了绕过方法？
    validations:
      required: false
