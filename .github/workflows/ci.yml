# CI pipeline for octo-server
# Runs on every pull request targeting main or release/** branches.
# Designed to be used as required status checks in branch rulesets.

name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
    # converted_to_draft is kept intentionally: it creates "skipped" check entries
    # that satisfy required-check branch-protection rules when a PR is demoted
    # back to draft, preventing stale "pending" statuses from the last real push.
    branches:
      - main
      - 'release/**'
    # paths-ignore is intentionally NOT set here — workflow-level path filtering
    # prevents GitHub from creating any check run, which deadlocks required-status
    # checks on docs-only PRs. Path-based skipping is handled by the `changes`
    # preflight job below instead (dorny/paths-filter produces "skipped" statuses
    # that GitHub counts as passing for required checks).
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.x'

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # code=true when at least one changed file matches the code filter.
      # predicate-quantifier:every + negation patterns (no bare '**'):
      # a file matches 'code' iff ALL negation patterns are satisfied
      # (file is not a doc/template). code=false only when all changed files
      # are docs/templates. Push events default to 'true'.
      code: ${{ github.event_name == 'pull_request' && steps.filter.outputs.code || 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: github.event_name == 'pull_request'
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          # predicate-quantifier: every — a file matches 'code' only when ALL
          # negation patterns are satisfied (file is NOT a doc/template file).
          #
          # Validated by picomatch v4 unit test (same library used internally):
          #   README.md:    !**/*.md=false → every=false → not match → code=false ✅
          #   main.go:      all negations=true → every=true → match → code=true ✅
          #   mixed PR:     main.go matches → code=true (some over changed files) ✅
          #   .golangci.yml: all negations=true → every=true → CI runs ✅
          #   Dockerfile:   all negations=true → CI runs ✅
          #
          # Do NOT add '**': picomatch('**') doesn't match dotfiles (.golangci.yml)
          # causing them to incorrectly skip CI with the 'every' quantifier.
          # Do NOT use 'some' + negation: '**' short-circuits some to true always.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'
              - '!.github/ISSUE_TEMPLATE/**'


  build:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: CGO_ENABLED=0 go build -v ./...

  test:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # MySQL, Redis, and WuKongIM are required by integration tests
    # (modules/{user,oidc,thread,group,space,botfather,...}). The tests
    # hardcode 127.0.0.1:3306 (root/demo/test), 127.0.0.1:6379, and
    # octo-lib's default WuKongIM API URL http://127.0.0.1:5001 — see
    # github.com/Mininglamp-OSS/octo-lib/testutil.NewTestServer and
    # config.New. Ports are mapped to the host so jobs running in the
    # runner VM can reach them via 127.0.0.1.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: demo
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pdemo"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      wukongim:
        # Keep this pinned. WuKongIM tags have changed manager-token and
        # tokenAuthOn behavior across releases; this tag is the docker
        # stack's validated baseline.
        image: wukongim/wukongim:v2.2.4-20260313
        env:
          WK_MODE: debug
          # Tests use octo-lib's default empty manager token. Disable IM
          # token auth explicitly so /channel and /health are reachable
          # from the runner without test-specific config files.
          WK_TOKENAUTHON: "false"
          WK_EXTERNAL_IP: 127.0.0.1
          WK_EXTERNAL_WSADDR: ws://127.0.0.1:5200
        ports:
          - 5001:5001
          - 5100:5100
          - 5200:5200
        options: >-
          --health-cmd="wget -q -O - http://127.0.0.1:5001/health >/dev/null 2>&1 || wget -q -O - http://127.0.0.1:5001/varz >/dev/null 2>&1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
          --health-start-period=40s
    env:
      # common.Setup (post 2026-05) refuses to boot without a 32-byte master
      # key; see modules/user/main_test.go for the same pattern. Use a fixed
      # 32-char value here so re-runs are reproducible (the value is
      # ephemeral CI-only and never used outside tests).
      OCTO_MASTER_KEY: 0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install MySQL/Redis client tooling
        run: |
          # mysql + redis-cli are needed below to reset the shared `test`
          # database between Go packages; ubuntu-latest's preinstall set
          # is not stable across runner image rolls so install fresh.
          sudo apt-get update -qq
          sudo apt-get install -y -qq mysql-client redis-tools

      - name: Wait for MySQL
        # mysql:8.0 defaults the server collation to utf8mb4_0900_ai_ci, but
        # we recreate the `test` database with utf8mb4_general_ci before
        # every package below — that is the canonical collation in
        # db/sqls (see modules/base/sql/20260512000001_base_oss_compat_repair.sql,
        # which proactively ALTERs sixteen tables to general_ci to escape
        # the 8.0 default). Tables created without explicit COLLATE inherit
        # the database default; using general_ci keeps them aligned with
        # the rest of the schema and avoids "Illegal mix of collations".
        run: |
          for _ in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot -pdemo --silent; then
              echo "mysql ready"
              exit 0
            fi
            sleep 2
          done
          echo "mysql did not become ready" >&2
          exit 1

      - name: Wait for WuKongIM
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5001/health >/dev/null || curl -fsS http://127.0.0.1:5001/varz >/dev/null; then
              echo "wukongim ready"
              exit 0
            fi
            sleep 2
          done
          echo "wukongim did not become ready" >&2
          exit 1

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Run tests
        id: run-tests
        # `testutil.NewTestServer` runs sql-migrate against the shared `test`
        # database during module.Setup, registering each migration in
        # gorp_migrations. When `go test ./...` walks packages sequentially,
        # the next package's module set may NOT include some migrations
        # registered by the previous package — sql-migrate then aborts with
        # `unknown migration in database`. The cleanest fix is to drop and
        # recreate the database between packages so each one starts from a
        # clean migration ledger. We also force utf8mb4_general_ci so legacy
        # CREATE TABLE statements that omit COLLATE inherit the canonical
        # collation (mysql:8.0 server default is utf8mb4_0900_ai_ci, which
        # would mix-collation-crash JOINs in space migrations).
        #
        # Individual tests known broken by the OCTO migration carry a
        # `t.Skip("OCTO migration TODO: ...issues/17")` marker in-source
        # — see issue #17 for the cleanup tracker. Grep for `OCTO migration
        # TODO` to find the suppressed tests.
        run: |
          set -euo pipefail
          fail=0
          echo "mode: atomic" > coverage.out
          pkg_index=0
          while read -r pkg; do
            mysql -h 127.0.0.1 -uroot -pdemo -e "DROP DATABASE IF EXISTS test; CREATE DATABASE test CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;"
            redis-cli -h 127.0.0.1 -p 6379 FLUSHALL >/dev/null
            echo "::group::go test $pkg"
            if ! gotestsum \
                --junitfile "junit-${pkg_index}.xml" \
                --format short-verbose \
                -- -race -shuffle=on -count=1 -timeout 5m \
                   -coverprofile="coverage-${pkg_index}.out" \
                   -covermode=atomic "$pkg"; then
              fail=1
            fi
            # Accumulate coverage data (skip mode line from each fragment).
            # Go only instruments the package under test, so the per-package
            # fragments do not overlap and concatenation is a valid merge.
            if [ -f "coverage-${pkg_index}.out" ]; then
              grep -v '^mode:' "coverage-${pkg_index}.out" >> coverage.out || true
            fi
            pkg_index=$((pkg_index + 1))
            echo "::endgroup::"
          done < <(go list ./...)

          echo "test_exit_code=${fail}" >> "$GITHUB_OUTPUT"
          exit $fail

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            junit-*.xml
            coverage.out
          retention-days: 14

      - name: Write PR summary
        if: always()
        # Aggregate counts across every per-package junit-*.xml fragment.
        # gotestsum does not expose a `tool merge` subcommand (only `slowest`
        # and `ci-matrix`), so we sum the root <testsuites> attributes
        # ourselves instead of relying on a merged junit.xml.
        run: |
          outcome="${{ steps.run-tests.outcome }}"
          case "$outcome" in
            success) verdict="✅ **PASSED**" ;;
            failure) verdict="❌ **FAILED**" ;;
            *)       verdict="⏭️ **${outcome}**" ;;
          esac

          total=0; failed=0; errors=0; skipped=0; passed=0; suites=0
          for xml in junit-*.xml; do
            [ -f "$xml" ] || continue
            suites=$(( suites + 1 ))
            # Root <testsuites> aggregates tests/failures/errors per file.
            t=$(grep -o 'tests="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo 0)
            f=$(grep -o 'failures="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo 0)
            e=$(grep -o 'errors="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo 0)
            # skipped lives only on per-suite <testsuite> elements; sum all.
            s=$(grep -o 'skipped="[0-9]*"' "$xml" | grep -o '[0-9]*' | paste -sd+ - | bc 2>/dev/null || echo 0)
            total=$(( total + t ))
            failed=$(( failed + f ))
            errors=$(( errors + e ))
            skipped=$(( skipped + s ))
          done
          passed=$(( total - failed - errors - skipped ))
          [ "$passed" -lt 0 ] && passed=0

          {
            echo "## 🧪 Test Results"
            echo
            echo "${verdict}"
            echo
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| 🧮 Total | ${total} |"
            echo "| ✅ Passed | ${passed} |"
            echo "| ❌ Failed | ${failed} |"
            echo "| 💥 Errors | ${errors} |"
            echo "| ⏭️ Skipped | ${skipped} |"
            echo "| 📦 Packages | ${suites} |"
            echo
            echo "**Flags:** \`-race -shuffle=on\` | **Services:** MySQL + Redis + WuKongIM"
            echo
            echo "📦 [Download artifacts](../actions/runs/${{ github.run_id }}#artifacts)"
          } >> "$GITHUB_STEP_SUMMARY"

  diff-coverage:
    needs: [changes, test]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.test.result == 'success' &&
      needs.changes.outputs.code == 'true'
    name: Diff Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Least-privilege: only this job needs to comment on PRs.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download test results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-results

      # Diff-only gate: report total coverage but only fail the job when the
      # *diff* coverage drops below 60%. coverage.acceptable is intentionally
      # omitted so this job does not block PRs based on the repo-wide baseline.
      - name: Generate octocov config
        run: |
          cat > .octocov.yml <<'EOF'
          coverage:
            paths:
              - coverage.out
          diff:
            coverage:
              acceptable: 60
          comment:
            enable: true
            hideFooterLink: false
          summary:
            enable: true
          EOF

      - name: Run octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

  vet:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Vet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Vet
        run: go vet ./...

  lint:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          args: --timeout=5m

  personal-msgsendreq-lint:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    # Mininglamp-OSS/octo-server#37: defense-in-depth wrapper for PERSONAL
    # MsgSendReq construction. The lint AST-walks modules/ and rejects any
    # composite literal of MsgSendReq{ChannelType: ChannelTypePerson...}, since
    # PERSONAL DM dispatchers MUST go through octo-lib's
    # config.NewPersonalMsgSendReq builder so payload.space_id authoritative
    # semantics are uniformly applied.
    name: Personal MsgSendReq Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Reject direct PERSONAL MsgSendReq literals
        run: go run ./tools/lint-personal-msgsendreq ./modules

  i18n-extract-check:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    # Phase 0.8/0.10 #1: the committed i18n marker files
    # (tools/i18nmarkers/{shared,server}/active.en-US.toml) must stay in sync
    # with the codes.Register / errcode.register call sites. A PR that adds or
    # edits a Code without re-running `make i18n-extract` would otherwise ship
    # a code with no translation marker (runtime DefaultMessage fallback). The
    # extractor's -check mode exits non-zero when on-disk markers diverge from
    # what extraction would emit.
    name: i18n Extract Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify i18n markers are up to date
        run: make i18n-extract-check

  i18n-lint:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    # Phase 0.10 i18n migration gates:
    #   #5 (D23): no NEW c.AbortWithStatusJSON / c.AbortWithStatus beyond the
    #             committed per-file baseline — a ratchet toward zero as
    #             modules migrate to httperr.ResponseErrorL.
    #   #3:       no inline codes.Code{...} literals passed to ResponseErrorL,
    #             which would bypass the registry (no translation marker, silent
    #             runtime downgrade to err.shared.internal).
    name: i18n Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: No new direct error responses (D23)
        run: go run ./tools/lint-direct-error-response

      - name: No unregistered codes in ResponseErrorL
        run: go run ./tools/lint-unregistered-code
